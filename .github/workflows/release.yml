name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vMAJOR.MINOR.PATCH, for example v1.0.0."
            exit 1
          fi

      - name: Verify tag is on main
        shell: bash
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag must point to a commit included in main."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.2.1"

      - name: Build
        run: gradle build

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=Jetpack $version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/Jetpack.jar
          generate_release_notes: true

      - name: Read generated release notes
        id: release_notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "changelog<<EOF"
            gh release view "$GITHUB_REF_NAME" --json body --jq .body
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Modrinth configuration
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT: ${{ vars.MODRINTH_PROJECT || vars.MODRINTH_ID }}
        run: |
          if [[ -z "$MODRINTH_TOKEN" ]]; then
            echo "Missing required secret: MODRINTH_TOKEN"
            exit 1
          fi
          if [[ -z "$MODRINTH_PROJECT" ]]; then
            echo "Missing required repository variable: MODRINTH_PROJECT"
            exit 1
          fi

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_PROJECT || vars.MODRINTH_ID }}
          name: ${{ steps.release_meta.outputs.name }}
          version: ${{ steps.release_meta.outputs.version }}
          changelog: ${{ steps.release_notes.outputs.changelog }}
          loaders: paper
          game-versions: "1.21.10"
          files: build/libs/Jetpack.jar
